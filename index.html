<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <title>Suporte Trelado</title>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script>
      // Captura erros de módulo que acontecem ANTES do React montar
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="padding:40px;color:#f87171;background:#1d2125;min-height:100vh;font-family:monospace">'
            + '<h2>Erro ao carregar aplicação</h2>'
            + '<pre style="white-space:pre-wrap;color:#94a3b8">' + (e.error ? e.error.stack || e.error.message : e.message) + '</pre>'
            + '</div>';
        }
      });
    </script>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
