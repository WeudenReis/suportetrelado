name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  quality:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Testes
        run: npm run test:run

      - name: Build
        run: npx vite build
        env:
          VITE_SUPABASE_URL: https://fake-ci.supabase.co
          VITE_SUPABASE_ANON_KEY: fake-anon-key-for-ci
